tters</h2><form action='https://formspree.io/f/YOUR_FORM_ID' method='POST'><input type='email' name='email' placeholder='your@email.com' required><button class='btn' type='submit'>Claim Your Seat</button></form></div></div></section><script>function showUniverse(){document.getElementById('universe').classList.remove('hidden')}</script></body></html>
