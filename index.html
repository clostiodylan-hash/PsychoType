or</div><div class='card'>⚗️ Builder</div><div class='card'>🔮 Visionary</div><div class='card'>🗝 Unlocker</div></div><h2>Join The Ledger</h2><p>The earliest GoldenHatters will witness the universe forming in real time.</p><form action='https://formspree.io/f/xdavoapl' method='POST'><input type='email' name='email' placeholder='Enter your email' required><br><br><button class='btn' type='submit'>Enter The Ledger</button></form></div></div></section><script>const target=new Date('2026-08-01T00:00:00').getTime();function updateCountdown(){const diff=target-Date.now();if(diff<=0){document.getElementById('countdown').textContent='THE AWAKENING HAS BEGUN';return;}const d=Math.floor(diff/86400000);const h=Math.floor((diff%86400000)/3600000);const m=Math.floor((diff%3600000)/60000);const s=Math.floor((diff%60000)/1000);document.getElementById('countdown').textContent=`${d}d ${h}h ${m}m ${s}s`;}updateCountdown();setInterval(updateCountdown,1000);</script></body></html>
